name: Refresh selected sources

on:
  workflow_dispatch:
    inputs:
      imd_cap_rss:
        description: IMD CAP RSS
        required: false
        default: false
        type: boolean
      imd_flash_flood_bulletin:
        description: IMD Flash Flood Bulletin
        required: false
        default: false
        type: boolean
      indiawris_rainfall:
        description: India-WRIS CWC Rainfall
        required: false
        default: false
        type: boolean
      indiawris_river_level:
        description: India-WRIS CWC River Water Level
        required: false
        default: false
        type: boolean
      ksdma_reservoirs:
        description: KSDMA Daily Dam Levels (KSEB)
        required: false
        default: false
        type: boolean
      ksdma_dam_management:
        description: KSDMA Daily Dam Levels (Irrigation)
        required: false
        default: false
        type: boolean
      cwc_ffs:
        description: CWC FFS Live River Levels
        required: false
        default: true
        type: boolean
      rainviewer_radar:
        description: RainViewer Radar Nowcast
        required: false
        default: false
        type: boolean
      nasa_imerg_nrt:
        description: NASA IMERG Near-Real-Time
        required: false
        default: false
        type: boolean
      operator_observations:
        description: Operator Observation Override
        required: false
        default: false
        type: boolean
      run_tests:
        description: Run npm test before refresh
        required: false
        default: false
        type: boolean
      ffs_curl_diagnostic:
        description: Run FFS curl diagnostic before refresh
        required: false
        default: true
        type: boolean
      send_telegram:
        description: Send Telegram alerts after refresh
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: refresh-flood-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Resolve selected sources
        run: |
          ids=()
          [[ "${{ inputs.imd_cap_rss }}" == "true" ]] && ids+=("imd-cap-rss")
          [[ "${{ inputs.imd_flash_flood_bulletin }}" == "true" ]] && ids+=("imd-flash-flood-bulletin")
          [[ "${{ inputs.indiawris_rainfall }}" == "true" ]] && ids+=("indiawris-rainfall")
          [[ "${{ inputs.indiawris_river_level }}" == "true" ]] && ids+=("indiawris-river-level")
          [[ "${{ inputs.ksdma_reservoirs }}" == "true" ]] && ids+=("ksdma-reservoirs")
          [[ "${{ inputs.ksdma_dam_management }}" == "true" ]] && ids+=("ksdma-dam-management")
          [[ "${{ inputs.cwc_ffs }}" == "true" ]] && ids+=("cwc-ffs")
          [[ "${{ inputs.rainviewer_radar }}" == "true" ]] && ids+=("rainviewer-radar")
          [[ "${{ inputs.nasa_imerg_nrt }}" == "true" ]] && ids+=("nasa-imerg-nrt")
          [[ "${{ inputs.operator_observations }}" == "true" ]] && ids+=("operator-observations")

          if [ ${#ids[@]} -eq 0 ]; then
            echo "No sources selected."
            exit 1
          fi

          source_ids="$(IFS=,; echo "${ids[*]}")"
          echo "SOURCE_IDS=$source_ids" >> "$GITHUB_ENV"
          echo "Selected sources: $source_ids"

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: npm test

      - name: Run FFS curl diagnostic
        if: ${{ inputs.cwc_ffs && inputs.ffs_curl_diagnostic }}
        run: |
          set +e
          OUT_CSV="$RUNNER_TEMP/ffs-gha-curl-test.csv"
          STATIONS_TSV="$RUNNER_TEMP/ffs-stations.tsv"

          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('data/manual/indiawris-stations.json','utf8')); const stations=(data.stations||[]).filter(s=>s.station_code && Array.isArray(s.source_types) && s.source_types.includes('river_level')); const sortCriteria={sortOrderDtos:[{sortDirection:'DESC',field:'id.dataTime'}]}; for (const s of stations) { const specification={where:{where:{expression:{valueIsRelationField:false,fieldName:'id.stationCode',operator:'eq',value:s.station_code}},and:{expression:{valueIsRelationField:false,fieldName:'id.datatypeCode',operator:'eq',value:'HHS'}}},and:{expression:{valueIsRelationField:false,fieldName:'dataValue',operator:'null',value:'false'}}}; const url='https://ffs.india-water.gov.in/iam/api/new-entry-data/specification/sorted-page?sort-criteria='+encodeURIComponent(JSON.stringify(sortCriteria))+'&page-number=0&page-size=2&specification='+encodeURIComponent(JSON.stringify(specification)); console.log([s.station_name||'', s.station_code, s.district_id||'', url].join('\t')); }" > "$STATIONS_TSV"

          printf 'station,code,district,status,type,rows,ms,error\n' > "$OUT_CSV"
          total=0
          failures=0

          while IFS=$'\t' read -r station code district url; do
            [ -z "$code" ] && continue
            total=$((total+1))
            body="$(mktemp)"
            started_ms=$(date +%s%3N)
            curl -sS -L \
              --max-time 15 \
              -H 'Accept: application/json, text/plain, */*' \
              -H 'Referer: https://ffs.india-water.gov.in/#/main/site' \
              -H 'User-Agent: KeralaFlashFloodWatch/0.1 (+https://github.com/kinkate18nic/kerala_flashflood_alert)' \
              "$url" \
              -o "$body"
            curl_exit=$?
            ended_ms=$(date +%s%3N)
            elapsed_ms=$((ended_ms-started_ms))

            if [ $curl_exit -ne 0 ]; then
              failures=$((failures+1))
              error="curl_exit_$curl_exit"
              printf '"%s","%s","%s",599,exception,0,%s,"%s"\n' "$station" "$code" "$district" "$elapsed_ms" "$error" >> "$OUT_CSV"
              rm -f "$body"
              continue
            fi

            content=$(cat "$body")
            compact=$(tr '\r\n' ' ' < "$body")
            rm -f "$body"

            first_char="${content:0:1}"
            type="other"
            rows=0
            status=200
            error=""

            if [[ "$content" == \[* ]]; then
              if [[ "$content" == "[]" ]]; then
                type="empty-json"
              else
                type="rows-json"
                rows=2
              fi
            elif [[ "$content" == \{* ]]; then
              type="object-json"
            elif [[ "$content" == \<* ]]; then
              type="html"
              failures=$((failures+1))
              error="html_instead_of_json"
            else
              type="other"
              failures=$((failures+1))
              error="non_json_response"
            fi

            printf '"%s","%s","%s",%s,%s,%s,%s,"%s"\n' \
              "$station" "$code" "$district" "$status" "$type" "$rows" "$elapsed_ms" "$error" >> "$OUT_CSV"

            sleep 0.8
          done < "$STATIONS_TSV"

          {
            echo "## FFS curl diagnostic"
            echo ""
            echo "- Stations tested: $total"
            echo "- Failures: $failures"
            echo "- CSV artifact: ffs-gha-curl-test"
            echo ""
            echo "### Type counts"
            tail -n +2 "$OUT_CSV" | cut -d, -f5 | sort | uniq -c | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload FFS curl diagnostic
        if: ${{ inputs.cwc_ffs && inputs.ffs_curl_diagnostic }}
        uses: actions/upload-artifact@v4
        with:
          name: ffs-gha-curl-test
          path: ${{ runner.temp }}/ffs-gha-curl-test.csv

      - name: Build live data (selected sources)
        env:
          PPS_EMAIL: ${{ secrets.PPS_EMAIL }}
          PPS_PASSWORD: ${{ secrets.PPS_PASSWORD }}
          NODE_OPTIONS: "--dns-result-order=ipv4first"
        run: node scripts/run-pipeline.js

      - name: Build static site
        run: node scripts/build-site.js

      - name: Send reviewed severe alerts
        if: ${{ inputs.send_telegram }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/send-telegram.js

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs runtime data/manual/review-approvals.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh selected sources"
            git push
          fi
