name: Refresh flood data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build live data
        env:
          NASA_IMERG_DATA_URL: ${{ secrets.NASA_IMERG_DATA_URL }}
          NASA_EARTHDATA_BEARER: ${{ secrets.NASA_EARTHDATA_BEARER }}
        run: node scripts/run-pipeline.js

      - name: Build static site
        run: node scripts/build-site.js

      - name: Send reviewed severe alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/send-telegram.js

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs runtime data/manual/review-approvals.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh flood data"
            git push
          fi
